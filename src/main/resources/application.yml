spring:
  application:
    name: appointment-agent
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

telegram:
  bot:
    username: ${TELEGRAM_BOT_USERNAME}
    token: ${TELEGRAM_BOT_TOKEN}

gemini:
  api-key: ${GEMINI_API_KEY}
  # Pinned version IDs (gemini-3.5-flash, gemini-2.5-flash, gemini-2.5-flash-lite, etc.) all 404
  # for this API key - it seems restricted to Google's alias names instead of specific versions.
  # Aliases resolve server-side to whatever model this key currently has access to.
  model: gemini-flash-latest
  fallback-model: gemini-flash-lite-latest

google:
  credentials-path: ${GOOGLE_CREDENTIALS_PATH}

email:
  from: ${EMAIL_USERNAME}
  from-name: BrightCare Clinic

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

clinic:
  name: BrightCare Clinic
  timezone: Asia/Kolkata

booking:
  slot-duration: 30
  business-start: "09:00"
  business-end: "18:00"
